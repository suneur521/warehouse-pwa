          <div style="display:none">`;
        // 通道内货架按 route_order 升序，同序先左后右
        const sortedShelves = [...chData.shelves.keys()].sort((a, b) => {
          const roA = shelfRouteMap[a] || 0, roB = shelfRouteMap[b] || 0;
          if (roA !== roB) return roA - roB;
          return (shelfSideMap[a] === 'left' ? 0 : 1) - (shelfSideMap[b] === 'left' ? 0 : 1);
        });
        for (const sc of sortedShelves) {
          const items = chData.shelves.get(sc);
          const scDisplay = escHtml(sc).replace(/(\d{2})$/, '<span style="color:#FF3B30">$1</span>');
          html += `<div class="shelf-group" data-shelf="${escHtml(sc)}">`;
          html += `<div style="margin:8px 0 4px 8px;padding:4px 8px;background:rgba(255,149,0,0.08);border-left:3px solid #FF9500;border-radius:4px;font-size:15.5px;color:var(--ios-text);font-weight:700">货架号：${scDisplay}</div>`;
          items.forEach(item => {
            html += `
          <div class="task-item" style="margin-left:8px">
            <div class="task-info">
              <div class="task-name">卡板 ${escHtml(String(item.pallet_code || '-').slice(-4))} | 现货：${esc(item.spot_qty)}</div>
              <div class="task-detail">${esc(item.goods_name)} (${esc(item.goods_code)})</div>
            </div>
            <button class="btn btn-success unload-btn perm-driver" data-id="${item.id}">下货</button>
          </div>`;
          });
          html += '</div>';
        }
        html += '</div></div>';
      }
    } else {
      // 全部视图：按货架（通道位置）分组 → 货架号 → 卡板
      const channelMap = new Map();
      data.forEach(row => {
        const ch = getChannel(row.shelf_code);
        const sc = row.shelf_code || '未知';
        if (!channelMap.has(ch)) channelMap.set(ch, new Map());
        const shelfMap = channelMap.get(ch);
        if (!shelfMap.has(sc)) shelfMap.set(sc, []);
        shelfMap.get(sc).push(row);
      });

      const sortedChannels = [...channelMap.keys()].sort(sortChannels);
      for (const ch of sortedChannels) {

        html += `<div class="group-card compact" data-channel="${escHtml(ch)}">

          <div style="display:none">`;

        const sortedShelves = [...shelfMap.keys()].sort();

          html += `<div class="shelf-group" data-shelf="${escHtml(sc)}">`;
          html += `<div style="margin:8px 0 4px 8px;padding:4px 8px;background:rgba(255,149,0,0.08);border-left:3px solid #FF9500;border-radius:4px;font-size:15.5px;color:var(--ios-text);font-weight:700">货架号：${scDisplay}</div>`;

  let cleanTimer = null;

  /**
   * 定时清空本店已下货记录（每天北京时间 09:00 触发）
   * 使用 setTimeout 递归预约下一次执行
   */
  function scheduleDailyClean() {
    clearTimeout(cleanTimer);
    const now = new Date();
    // 北京时间 09:00 = UTC 01:00
    const next = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(), 1, 0, 0));
    if (next <= now) next.setUTCDate(next.getUTCDate() + 1);
    const delay = next - now;
    cleanTimer = setTimeout(async () => {
      try {
        const user = getCurrentUser();
        if (!user) { scheduleDailyClean(); return; }
        const { error } = await supabase.from('replenish_demand')
          .delete()
          .eq('status', 'unloaded')
          .eq('store_no', user.store_no);
        if (!error) {
          allUnloadedData = [];
          if (currentPageName === 'driver' && currentDriverZone === '已下货') renderUnloadedList();
          else if (currentPageName === 'driver') renderDriverDeptNav();
          console.log('已下货定时清空完成:', new Date().toLocaleString());
        }
      } catch (e) {}
      scheduleDailyClean(); // 预约明天
    }, delay);
  }

  /**
   * 加载司机下货页：并行拉取本店 pending + unloaded + 路线数据
   * 写入 allDriverData / allUnloadedData / shelfRouteMap / shelfChannelMap 后触发渲染
   */
  async function loadDriverView() {
    const user = getCurrentUser();
    const container = document.getElementById('driverContainer');
    container.innerHTML = '<div class="loading-text">加载中</div>';

    // 加载本店自定义路线（Supabase，跨设备同步）
    await loadCustomRoutes();

    // 同时加载待下货、已下货和路线数据
    const [pendingRes, unloadedRes, routesRes] = await Promise.all([
      supabase.from('replenish_demand').select('*').eq('store_no', user.store_no).eq('status', 'pending').order('shelf_code'),
      supabase.from('replenish_demand').select('*').eq('store_no', user.store_no).eq('status', 'unloaded').order('shelf_code'),
      supabase.from('shelf_routes').select('*').eq('store_no', user.store_no)
    ]);

    if (pendingRes.error) {
      container.innerHTML = '<div class="empty">加载失败：' + pendingRes.error.message + '</div>';
      return;
    }

    allDriverData = pendingRes.data || [];
    allUnloadedData = unloadedRes.data || [];

    // 构建 shelf_code → route_order、channel_position、left/right 映射
    shelfRouteMap = {};
    shelfChannelMap = {};
    shelfSideMap = {};
    allShelfRoutes = routesRes.data || [];
    allShelfRoutes.forEach(r => {
      if (r.left_shelf_code) {
        shelfRouteMap[r.left_shelf_code] = r.route_order;
        shelfChannelMap[r.left_shelf_code] = r.channel_position;
        shelfSideMap[r.left_shelf_code] = 'left';
      }
      if (r.right_shelf_code) {
        shelfRouteMap[r.right_shelf_code] = r.route_order;
        shelfChannelMap[r.right_shelf_code] = r.channel_position;
        shelfSideMap[r.right_shelf_code] = 'right';
      }
    });

    if (currentDriverZone === '已下货') {
      renderUnloadedList();
    } else {
      renderDriverList();
    }
  }

  const uploadArea = document.getElementById('uploadArea');
  const excelFile = document.getElementById('excelFile');
  const uploadResult = document.getElementById('uploadResult');

  const uploadFileName = document.getElementById('uploadFileName');

  /**
   * 处理库位数据 Excel 上传：解析 → 强制 store_no → 批量插入新数据 → 删除旧数据
   * 采用 insert-then-delete 模式保证原子性，失败回滚显示错误
   * @param {File} file Excel 文件（.xlsx/.xls）
   */
  async function handleFileUpload(file) {
    if (!file.name.match(/\.(xlsx|xls)$/)) {
      showUploadResult('error', '请选择Excel文件（.xlsx或.xls格式）');
      return;
    }
    if (!checkOnlineOrToast()) return;

    uploadFileName.textContent = file.name;
    document.getElementById('uploadPrompt').style.display = 'none';
    showUploadResult('loading', '正在解析文件...');
    uploadProgress.style.display = 'block';
    updateProgress(10, '读取文件中...');

    try {
      const buffer = await file.arrayBuffer();
      updateProgress(20, '解析数据中...');
      const workbook = XLSX.read(buffer, { type: 'array' });

      const firstSheet = workbook.SheetNames[0];
      if (!firstSheet) { showUploadResult('error', 'Excel无工作表'); return; }

      const sheetData = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheet]);
      if (!sheetData || sheetData.length === 0) { showUploadResult('error', '未读取到数据'); return; }

      updateProgress(30, '已解析 ' + sheetData.length + ' 条，准备上传...');

      const currentStoreNo = getCurrentUser().store_no;
      const allRecords = sheetData.map(row => ({
        store_no: currentStoreNo,
        category: String(row['品类'] || row['category'] || ''),
        goods_code: String(row['商品号'] || row['goods_code'] || ''),
        location_code: String(row['库位'] || row['location_code'] || ''),
        inventory_attr: String(row['库存属性'] || row['inventory_attr'] || ''),
        pallet_code: String(row['卡板'] || row['pallet_code'] || '').trim(),
        goods_name: String(row['商品名称'] || row['goods_name'] || ''),
        spec: String(row['规格'] || row['spec'] || ''),
        spot_qty: parseInt(row['现货数量'] || row['spot_qty'] || 0),
        shelf_code: String(row['货架号'] || row['shelf_code'] || ''),
        storage_area: String(row['储区'] || row['storage_area'] || ''),
        allocated_qty: parseInt(row['分配数量'] || row['allocated_qty'] || 0),
        available_qty: parseInt(row['可用数量'] || row['available_qty'] || 0)
      }));

      // 剔除卡板为空的行
      const records = allRecords.filter(r => r.pallet_code !== '');
      const skipped = allRecords.length - records.length;

      if (records.length === 0) {
        showUploadResult('error', '文件中无有效数据（卡板为空的行已剔除 ' + skipped + ' 条）');
        uploadProgress.style.display = 'none';
        return;
      }

      updateProgress(35, '备份旧数据ID中...');

      // 先获取本店旧数据ID，用于插入成功后清理
      const { data: oldRows } = await supabase.from('storage_location')
        .select('id')
        .eq('store_no', currentStoreNo);
      const oldIds = oldRows ? oldRows.map(r => r.id) : [];

      updateProgress(40, '上传新数据中...（已剔除 ' + skipped + ' 条无卡板记录）');

      // 先上传新数据，成功后再删除旧数据，避免中途失败导致数据丢失
      const batchSize = 500;
      let insertedCount = 0;
      const insertedIds = [];

      for (let i = 0; i < records.length; i += batchSize) {
        const batch = records.slice(i, i + batchSize);
        const { data: insData, error: insErr } = await supabase.from('storage_location').insert(batch).select('id');

        if (insErr) {
          // 插入失败，回滚已插入的数据
          if (insertedIds.length > 0) {
            await supabase.from('storage_location').delete().in('id', insertedIds.flat());
          }
          showUploadResult('error', '上传失败（第' + (Math.floor(i / batchSize) + 1) + '批）：' + insErr.message);
          uploadProgress.style.display = 'none';
          return;
        }

        if (insData) insertedIds.push(insData.map(r => r.id));
        insertedCount += batch.length;
        updateProgress(40 + Math.round((insertedCount / records.length) * 40), '已上传 ' + insertedCount + ' / ' + records.length);
      }

      // 新数据全部插入成功后，删除旧数据
      updateProgress(85, '清理旧数据中...');
      const newIdSet = new Set(insertedIds.flat());
      const idsToDelete = oldIds.filter(id => !newIdSet.has(id));
      for (let j = 0; j < idsToDelete.length; j += batchSize) {
        const delBatch = idsToDelete.slice(j, j + batchSize);
        const { error: delErr } = await supabase.from('storage_location').delete().in('id', delBatch);
        if (delErr) console.warn('清理旧数据警告:', delErr.message);
      }

      updateProgress(100, '上传完成！');
      uploadProgress.style.display = 'none';
      showUploadResult('success', '上传成功！共 ' + records.length + ' 条记录已存入数据库');

    } catch (err) {
      console.error(err);
      showUploadResult('error', '文件处理失败：' + err.message);
      uploadProgress.style.display = 'none';
    }
  }

  function updateProgress(pct, text) {
    progressBar.style.width = pct + '%';
    progressText.textContent = text;
  }

  function showUploadResult(type, message) {
    uploadResult.style.display = 'block';
    uploadResult.textContent = message;
    uploadResult.style.cssText = '';
    if (type === 'success') {
      uploadResult.style.cssText = 'background:rgba(52,199,89,0.08);color:#34C759;border:0.5px solid rgba(52,199,89,0.25);display:block;margin-top:12px;padding:10px;border-radius:10px;font-size:14px';
      setTimeout(() => { uploadResult.style.display = 'none'; }, 8000);
    } else if (type === 'error') {
      uploadResult.style.cssText = 'background:rgba(255,59,48,0.08);color:#FF3B30;border:0.5px solid rgba(255,59,48,0.25);display:block;margin-top:12px;padding:10px;border-radius:10px;font-size:14px';
    } else {
      uploadResult.style.cssText = 'background:rgba(0,122,255,0.06);color:#007AFF;border:0.5px solid rgba(0,122,255,0.25);display:block;margin-top:12px;padding:10px;border-radius:10px;font-size:14px';
    }
  }

  // ==========================================
  // 页面4-B：上传叉货路线
  // ==========================================
  const routeUploadArea = document.getElementById('routeUploadArea');
  const routeExcelFile = document.getElementById('routeExcelFile');
  const routeUploadResult = document.getElementById('routeUploadResult');
  const routeUploadProgress = document.getElementById('routeUploadProgress');
  const routeProgressBar = document.getElementById('routeProgressBar');
  const routeProgressText = document.getElementById('routeProgressText');
  const routeUploadFileName = document.getElementById('routeUploadFileName');

  routeUploadArea.addEventListener('click', () => routeExcelFile.click());

  routeUploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    routeUploadArea.classList.add('drag-over');
  });
  routeUploadArea.addEventListener('dragleave', () => routeUploadArea.classList.remove('drag-over'));
  routeUploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    routeUploadArea.classList.remove('drag-over');
    if (e.dataTransfer.files.length > 0) handleRouteFileUpload(e.dataTransfer.files[0]);
  });

  routeExcelFile.addEventListener('change', (e) => {
    if (e.target.files.length > 0) handleRouteFileUpload(e.target.files[0]);
  });

  function routeUpdateProgress(pct, text) {
    routeProgressBar.style.width = pct + '%';
    routeProgressText.textContent = text;
  }

  function showRouteUploadResult(type, message) {
    routeUploadResult.style.display = 'block';
    routeUploadResult.textContent = message;
    routeUploadResult.style.cssText = '';
    if (type === 'success') {
      routeUploadResult.style.cssText = 'background:rgba(52,199,89,0.08);color:#34C759;border:0.5px solid rgba(52,199,89,0.25);display:block;margin-top:12px;padding:10px;border-radius:10px;font-size:14px';
      setTimeout(() => { routeUploadResult.style.display = 'none'; }, 8000);
    } else if (type === 'error') {
      routeUploadResult.style.cssText = 'background:rgba(255,59,48,0.08);color:#FF3B30;border:0.5px solid rgba(255,59,48,0.25);display:block;margin-top:12px;padding:10px;border-radius:10px;font-size:14px';
    } else {
      routeUploadResult.style.cssText = 'background:rgba(0,122,255,0.06);color:#007AFF;border:0.5px solid rgba(0,122,255,0.25);display:block;margin-top:12px;padding:10px;border-radius:10px;font-size:14px';
    }
  }

  /**
   * 处理叉货路线 Excel 上传：解析 → 强制 store_no → 全量替换 shelf_routes 表
   * @param {File} file Excel 文件（.xlsx/.xls）
   */
  async function handleRouteFileUpload(file) {
    if (!file.name.match(/\.(xlsx|xls)$/)) {
      showRouteUploadResult('error', '请选择Excel文件（.xlsx或.xls格式）');
      return;
    }
    if (!checkOnlineOrToast()) return;

    routeUploadFileName.textContent = file.name;
    document.getElementById('routeUploadPrompt').style.display = 'none';
    showRouteUploadResult('loading', '正在解析文件...');
    routeUploadProgress.style.display = 'block';
    routeUpdateProgress(10, '读取文件中...');

    try {
      const buffer = await file.arrayBuffer();
      routeUpdateProgress(20, '解析数据中...');
      const workbook = XLSX.read(buffer, { type: 'array' });

      const firstSheet = workbook.SheetNames[0];
      if (!firstSheet) { showRouteUploadResult('error', 'Excel无工作表'); return; }

      const sheetData = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheet]);
      if (!sheetData || sheetData.length === 0) { showRouteUploadResult('error', '未读取到数据'); return; }

      routeUpdateProgress(30, '已解析 ' + sheetData.length + ' 条，准备上传...');

      const currentStoreNo = getCurrentUser().store_no;
      const records = sheetData.map(row => ({
        store_no: currentStoreNo,
        area: String(row['区域'] || row['area'] || ''),
        channel_position: String(row['通道位置'] || row['channel_position'] || ''),
        left_shelf_code: String(row['左侧货架号'] || row['left_shelf_code'] || ''),
        right_shelf_code: String(row['右侧货架号'] || row['right_shelf_code'] || ''),
        route_order: parseInt(row['路线顺序号'] || row['route_order'] || 0)
      }));

      routeUpdateProgress(35, '备份旧数据ID中...');

      // 先获取本店旧数据ID，用于插入成功后清理
      const { data: oldRouteRows } = await supabase.from('shelf_routes')
        .select('id')
        .eq('store_no', currentStoreNo);
      const oldRouteIds = oldRouteRows ? oldRouteRows.map(r => r.id) : [];

      routeUpdateProgress(40, '上传新数据中...');

      // 先上传新数据，成功后再删除旧数据
      const batchSize = 500;
      let insertedCount = 0;
      const insertedIds = [];

      for (let i = 0; i < records.length; i += batchSize) {
        const batch = records.slice(i, i + batchSize);
        const { data: insData, error: insErr } = await supabase.from('shelf_routes').insert(batch).select('id');

        if (insErr) {
          if (insertedIds.length > 0) {
            await supabase.from('shelf_routes').delete().in('id', insertedIds.flat());
          }
          showRouteUploadResult('error', '上传失败（第' + (Math.floor(i / batchSize) + 1) + '批）：' + insErr.message);
          routeUploadProgress.style.display = 'none';
          return;
        }

        if (insData) insertedIds.push(insData.map(r => r.id));
        insertedCount += batch.length;
        routeUpdateProgress(40 + Math.round((insertedCount / records.length) * 40), '已上传 ' + insertedCount + ' / ' + records.length);
      }

      // 新数据全部插入成功后，删除旧数据
      routeUpdateProgress(85, '清理旧数据中...');
      const newRouteIdSet = new Set(insertedIds.flat());
      const routeIdsToDelete = oldRouteIds.filter(id => !newRouteIdSet.has(id));
      for (let j = 0; j < routeIdsToDelete.length; j += batchSize) {
        const delBatch = routeIdsToDelete.slice(j, j + batchSize);
        const { error: delErr } = await supabase.from('shelf_routes').delete().in('id', delBatch);
        if (delErr) console.warn('清理旧数据警告:', delErr.message);
      }

      routeUpdateProgress(100, '上传完成！');
      routeUploadProgress.style.display = 'none';
      showRouteUploadResult('success', '上传成功！共 ' + records.length + ' 条叉货路线已存入数据库');

    } catch (err) {
      console.error(err);
      showRouteUploadResult('error', '文件处理失败：' + err.message);
      routeUploadProgress.style.display = 'none';
    }
  }

  // ==========================================
  // 辅助函数
  // ==========================================
  /**
   * HTML 转义，防止 XSS（转义 & < > " '）
   * @param {*} s 任意输入值
   * @returns {string}
   */
  function escHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  /**
   * escHtml 简写：null/undefined 时使用 fallback
   * @param {*} s 输入值
   * @param {string} [fallback='-'] 空值回退文本
   * @returns {string}
   */
  function esc(s, fallback = '-') {
    return escHtml(s ?? fallback);
  }

  /**
   * 切换页面：处理页面权限校验、Tab 状态、Header 显示、localStorage 记忆
   * @param {'login'|'create'|'list'|'driver'|'storage'} pageName 目标页面
   */
  function switchToPage(pageName) {
    // 页面级权限校验：未登录只能访问登录页
    const user = getCurrentUser();
    if (pageName !== 'login' && !user) {
      showToast('请先登录');
      pageName = 'login';
    }
    // 数据上传页仅管理员可访问
    if (pageName === 'storage' && user && user.role !== '管理员') {
      showToast('仅管理员可访问数据上传');
      pageName = 'login';
    }
    currentPageName = pageName;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const targetTab = document.querySelector('.tab[data-page="' + pageName + '"]');
    if (targetTab) targetTab.classList.add('active');
    const targetPage = document.getElementById('page-' + pageName);
    if (targetPage) targetPage.classList.add('active');
    pageTitleEl.textContent = pageTitles[pageName] || '';
    headerBackBtn.style.display = (pageName === 'list') ? 'block' : 'none';
    // 非登录页显示店号：姓名（加大加亮）
    const userNameEl = document.getElementById('headerUserName');
    if (pageName !== 'login' && user) {
      userNameEl.textContent = user.store_no + '：' + user.name;
      userNameEl.style.display = 'block';
    } else if (pageName === 'login') {
      userNameEl.style.display = 'none';
    }
    localStorage.setItem('currentPage', pageName);
    // 更新页面权限
    if (pageName === 'login') {
      checkLoginStatus();
    } else {
      updatePagePermissions();
    }
  }

  // 页面卸载时释放摄像头和实时通道
  window.addEventListener('beforeunload', () => {
    pageUnloading = true;
    if (scannerRunning) {
      window._stopScan(true);
    }
    if (realtimeChannel) {
      try { supabase.removeChannel(realtimeChannel); } catch (e) {}
    }
  });

  // 页面恢复可见时检查 Realtime 连接
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && !realtimeSubscribed) {
      initRealtime();
    }
  });

  // 页面初始化
  checkLoginStatus();
  // 登录成功后停留在登录页，刷新时恢复上次浏览页面
  const savedPage = localStorage.getItem('currentPage');
  if (savedPage && savedPage !== 'login' && getCurrentUser()) {
    switchToPage(savedPage);
    if (savedPage === 'list') loadDemandList();
    else if (savedPage === 'driver') loadDriverView();
  } else if (getCurrentUser()) {
    switchToPage('login');
  }
  initRealtime();
  scheduleDailyClean();
</script>
